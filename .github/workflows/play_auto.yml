name: Play Store Automation
run-name: Deploy ${{ inputs.app }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Choose which app to build and deploy'
        required: true
        type: choice
        options:
          - noise_remover
          - vitamindtracker
          - image_enhancer
          - face_scanner
          - resistor_scanner
          - face_scanner
          - root_detection_app
          - surebets_calculator
          - resistor-calc
          - fake_gps_detector
        default: noise_remover
      build_apk:
        description: 'Build and upload Universal APK'
        required: false
        type: boolean
        default: false
      run_tests:
        description: 'Run Robo tests on Firebase Test Lab'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      JVM_MS: 4g
      JVM_MX: ${{ inputs.app == 'resistor_scanner' && '10g' || '8g' }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: 'Persie0/${{ inputs.app }}'
          token: ${{ secrets.GH_TOKEN }}

      - name: Checkout EULA repository
        uses: actions/checkout@v4
        with:
          repository: 'Persie0/Persie0.github.io'
          token: ${{ secrets.EULA_TOKEN }}
          path: 'eula_repo'

      - name: Update EULA and static assets
        run: |
          mkdir -p assets/eula/translations_eula
          mkdir -p assets/eula/static
          cp -rf eula_repo/translations_eula/* assets/eula/translations_eula/
          cp -rf eula_repo/static/* assets/eula/static/
          rm -rf eula_repo
          echo "EULA and static assets updated successfully."
          echo "--- Checking eula-en.html ---"
          cat assets/eula/translations_eula/eula-en.html

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21.x'

      - name: Set KeyStore Secrets
        run: |
          if [[ "${{ inputs.app }}" == "noise_remover" ]]; then
            echo "STORE_PASS=${{ secrets.NOISE_REMOVER_STORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_PASS=${{ secrets.NOISE_REMOVER_KEY_PASSWORD }}" >> $GITHUB_ENV
          elif [[ "${{ inputs.app }}" == "resistor_scanner" ]]; then
            echo "STORE_PASS=${{ secrets.RESISTOR_SCANNER_STORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_PASS=${{ secrets.RESISTOR_SCANNER_KEY_PASSWORD }}" >> $GITHUB_ENV
          else
            echo "STORE_PASS=${{ secrets.STORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_PASS=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: Update KeyStore password in gradle properties
        run: |
          PROPERTIES_FILE=$(find . -name "key.properties" | grep "android/" | head -n 1 || find . -name "key.properties" | head -n 1)
          if [ -f "$PROPERTIES_FILE" ]; then
            sed -i "s/#{KEYSTORE_PASS}#/${{ env.STORE_PASS }}/g" "$PROPERTIES_FILE"
            sed -i "s/#{KEYSTORE_KEY_PASS}#/${{ env.KEY_PASS }}/g" "$PROPERTIES_FILE"
            
            if [[ "${{ inputs.app }}" == "resistor_scanner" ]]; then
               sed -i "s/#{KEYSTORE_OTHER_PASS}#/${{ env.OTHER_PASS }}/g" "$PROPERTIES_FILE"
            fi
            
            # Extract keyAlias dynamically
            KEY_ALIAS=$(grep "^keyAlias=" "$PROPERTIES_FILE" | cut -d'=' -f2 | xargs | tr -d '\r')
            if [ -n "$KEY_ALIAS" ]; then
              echo "KEY_ALIAS=$KEY_ALIAS" >> $GITHUB_ENV
              echo "Detected keyAlias: $KEY_ALIAS from $PROPERTIES_FILE"
            else
              echo "KEY_ALIAS=key" >> $GITHUB_ENV
            fi
            
            echo "Updated $PROPERTIES_FILE"
          else
            echo "::warning::key.properties not found. Using defaults."
            echo "KEY_ALIAS=key" >> $GITHUB_ENV
          fi
          
          # Find the actual keystore path
          KEYSTORE_PATH=$(find . -name "*.jks" -o -name "*.keystore" | grep "android/" | head -n 1 | sed 's|^\./||')
          if [ -n "$KEYSTORE_PATH" ]; then
            echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> $GITHUB_ENV
            echo "Detected KEYSTORE_PATH: $KEYSTORE_PATH"
          else
             echo "KEYSTORE_PATH=android/app/key.jks" >> $GITHUB_ENV
          fi

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Package Name
        id: get_package_name
        run: |
          # Prioritize the main app's build.gradle, then check others if not found
          FILES=$(find android/app -type f \( -name "build.gradle" -o -name "build.gradle.kts" \) 2>/dev/null | head -n 1)
          if [ -z "$FILES" ]; then
            FILES=$(find . -type f \( -name "build.gradle" -o -name "build.gradle.kts" \) -not -path "*/build/*" -not -path "*/.dart_tool/*" | sort)
          fi
          
          PACKAGE_NAME=""
          for FILE in $FILES; do
              # Try to extract applicationId first (Groovy: applicationId "pkg", Kotlin: applicationId = "pkg")
              PACKAGE_NAME=$(grep -oP 'applicationId\s*=?\s*["'\'']\K[^"'\'']+' "$FILE" | head -n 1)
              
              # Fallback to namespace if applicationId not found
              if [ -z "$PACKAGE_NAME" ]; then
                 PACKAGE_NAME=$(grep -oP 'namespace\s*=?\s*["'\'']\K[^"'\'']+' "$FILE" | head -n 1)
              fi
              
              if [ -n "$PACKAGE_NAME" ] && [[ "$PACKAGE_NAME" != *"\${"* ]]; then
                echo "Found package name \"$PACKAGE_NAME\" in $FILE"
                break
              fi
          done
          
          if [ -z "$PACKAGE_NAME" ]; then
             echo "::error::Could not extract package name from any build.gradle(.kts) file."
             exit 1
          fi
          
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
          echo "Extracted Package Name: $PACKAGE_NAME"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Pre-install NDK
        run: |
          # Read the NDK version Flutter/Gradle actually needs
          NDK_VERSION=$(grep -r "ndkVersion" android/ --include="*.gradle" --include="*.gradle.kts" | grep -oP '"\K[^"]+' | head -n 1)
          if [ -z "$NDK_VERSION" ]; then
            # Flutter's default NDK for stable channel as of mid-2024
            NDK_VERSION="29.0.14206865"
          fi
          echo "Installing NDK $NDK_VERSION before build..."
          echo "y" | sdkmanager "ndk;${NDK_VERSION}" --sdk_root=$ANDROID_SDK_ROOT
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$NDK_VERSION" >> $GITHUB_ENV


      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v2
        with:
          remove_android: false
          remove_dotnet: false
          remove_haskell: true
          remove_tool_cache: false
          remove_swap: false
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift"
          testing: false

      - name: Update gradle.properties
        run: |
          touch android/gradle.properties

          sed -i '/org.gradle.jvmargs=/d' android/gradle.properties
          sed -i '/kotlin.daemon/d' android/gradle.properties
          sed -i '/kotlin.compiler/d' android/gradle.properties
          sed -i '/android.r8/d' android/gradle.properties
          sed -i '/org.gradle.workers/d' android/gradle.properties
          sed -i '/org.gradle.daemon=/d' android/gradle.properties
          sed -i '/org.gradle.vfs.watch=/d' android/gradle.properties

          # One JVM, all memory goes here
          echo "org.gradle.jvmargs=-Xms6g -Xmx13g -XX:+UseParallelGC -XX:ParallelGCThreads=2" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "org.gradle.vfs.watch=false" >> android/gradle.properties
          echo "org.gradle.workers.max=1" >> android/gradle.properties

          # Kotlin in same JVM - no second process
          echo "kotlin.compiler.execution.strategy=in-process" >> android/gradle.properties

          # R8 heap
          echo "android.r8.jvmargs=-Xmx6g -XX:+UseParallelGC" >> android/gradle.properties

          cat android/gradle.properties

      - run: flutter pub get

      - name: Build
        env:
          # This reaches Gradle even when Flutter rewrites the invocation
          GRADLE_OPTS: "-Dorg.gradle.jvmargs='-Xms6g -Xmx13g -XX:+UseParallelGC' -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=1 -Dandroid.r8.jvmargs='-Xmx6g'"
        run: |
          flutter build appbundle \
            --obfuscate \
            --split-debug-info=./build

      - name: Sentry Upload
        run: |
          if grep -q "sentry_dart_plugin" pubspec.yaml; then
            flutter packages pub run sentry_dart_plugin
          else
            echo "Sentry plugin not found in pubspec.yaml, skipping upload."
          fi
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Download bundletool
        if: github.event.inputs.build_apk == 'true' || github.event.inputs.run_tests == 'true'
        run: |
          wget https://github.com/google/bundletool/releases/download/1.15.6/bundletool-all-1.15.6.jar -O bundletool.jar

      - name: Extract APK from AAB
        if: github.event.inputs.build_apk == 'true' || github.event.inputs.run_tests == 'true'
        run: |
          java -jar bundletool.jar build-apks --overwrite --bundle=build/app/outputs/bundle/release/app-release.aab --output=app.apks --mode=universal --ks="${{ env.KEYSTORE_PATH }}" --ks-pass=pass:${{ env.STORE_PASS }} --ks-key-alias="${{ env.KEY_ALIAS }}" --key-pass=pass:${{ env.KEY_PASS }}
          unzip -o app.apks -d extracted_apk
          mv extracted_apk/universal.apk app-release.apk

      - name: Upload Android Release to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          tracks: internal

      - name: Authenticate to Google Cloud
        if: github.event.inputs.run_tests == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        if: github.event.inputs.run_tests == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Run Tests on Firebase Test Lab
        if: github.event.inputs.run_tests == 'true'
        run: |
          gcloud firebase test android run \
            --app=app-release.apk \
            --type=robo \
            --device=model=MediumPhone.arm,version=34 \
            --timeout=180s \
            --no-auto-google-login

      - name: Stop Gradle daemons
        if: always()
        run: |
          cd android && ./gradlew --stop || true
          pkill -f GradleDaemon || true
